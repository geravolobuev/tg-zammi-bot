<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Highlighter</title>
    <style>
      :root {
        --bg: #f7f3e8;
        --panel: #fffdf8;
        --ink: #2d2418;
        --muted: #7e6c57;
        --accent: #d86f2d;
        --accent-2: #1f9d64;
        --line: #ddcfb5;
        --danger: #b94a48;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top, #fff9ef 0, var(--bg) 60%);
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 18px 14px 36px; }
      h1 { margin: 0 0 6px; font-size: 30px; }
      .sub { color: var(--muted); margin-bottom: 16px; }
      .grid { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 14px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 6px 24px rgba(60, 40, 10, 0.05);
      }
      .card h2 { margin: 0 0 10px; font-size: 18px; }
      .row, .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
      input[type="text"], input[type="email"], textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: white;
        color: var(--ink);
      }
      textarea {
        min-height: 260px;
        resize: vertical;
        font: 15px/1.5 Georgia, serif;
      }
      button, .file-label {
        border: 1px solid var(--line);
        background: white;
        color: var(--ink);
        border-radius: 10px;
        padding: 9px 12px;
        cursor: pointer;
        font-size: 14px;
      }
      button.primary { background: var(--accent); color: white; border-color: #b85b22; }
      button.good { background: var(--accent-2); color: white; border-color: #17714a; }
      button.danger { background: white; color: var(--danger); border-color: #d5a5a5; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .status { margin-top: 10px; font-size: 14px; color: var(--muted); white-space: pre-wrap; }
      .status.error { color: #b30000; }
      .status.ok { color: #17714a; }
      .book-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
      .book-item { border: 1px solid var(--line); border-radius: 10px; background: white; padding: 10px; }
      .book-item.active { border-color: var(--accent); background: #fff7f0; }
      .book-title { font-weight: 600; }
      .book-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
      .preview {
        margin-top: 12px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        min-height: 140px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .preview img, .preview video { width: 100%; display: block; }
      .notes-list { display: flex; flex-direction: column; gap: 10px; }
      .note-item { border-top: 1px solid var(--line); padding-top: 10px; }
      .note-item:first-child { border-top: none; padding-top: 0; }
      .note-time { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
      .hidden { display: none !important; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Book Highlighter</h1>
      <div class="sub">Логин по magic link, книги и заметки в Supabase, OCR через OpenRouter.</div>

      <section id="authCard" class="card">
        <h2>Вход</h2>
        <div class="row">
          <input id="emailInput" type="email" placeholder="you@example.com" />
          <button id="signInBtn" class="primary">Отправить magic link</button>
          <button id="signOutBtn" class="hidden">Выйти</button>
        </div>
        <div id="authStatus" class="status">Войди по email, чтобы открыть книги и заметки.</div>
      </section>

      <section id="appSection" class="hidden">
        <div class="grid" style="margin-top: 14px;">
          <aside class="card">
            <h2>Книги</h2>
            <div class="row">
              <input id="newBookInput" type="text" placeholder="Название книги" />
              <button id="addBookBtn" class="primary">Добавить</button>
            </div>
            <div id="currentBookLabel" class="status">Активная книга не выбрана</div>
            <div id="booksList" class="book-list"></div>
          </aside>

          <main class="card">
            <h2>OCR и сохранение</h2>
            <div class="toolbar">
              <button id="startCameraBtn">Включить камеру</button>
              <button id="captureBtn" class="primary">Сфотографировать</button>
              <label class="file-label" for="photoInput">Загрузить фото</label>
              <input id="photoInput" class="hidden" type="file" accept="image/*" />
              <button id="ocrBtn" class="good">Распознать текст</button>
              <button id="saveSelectionBtn">Сохранить выделенное</button>
              <button id="saveAllBtn">Сохранить весь текст</button>
            </div>
            <div class="preview">
              <video id="cameraVideo" playsinline autoplay muted class="hidden"></video>
              <img id="previewImage" alt="preview" class="hidden" />
              <div id="emptyPreview">Фото ещё не выбрано</div>
            </div>
            <div id="imageMeta" class="status">Нет изображения</div>
            <textarea id="ocrText" placeholder="После OCR текст появится здесь. Его можно исправить и затем сохранить."></textarea>
            <div id="mainStatus" class="status"></div>
          </main>
        </div>

        <section class="card" style="margin-top: 14px;">
          <h2>Последние 5 заметок активной книги</h2>
          <div id="notesList" class="notes-list"></div>
        </section>
      </section>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      const authCard = document.getElementById('authCard');
      const appSection = document.getElementById('appSection');
      const emailInput = document.getElementById('emailInput');
      const signInBtn = document.getElementById('signInBtn');
      const signOutBtn = document.getElementById('signOutBtn');
      const authStatus = document.getElementById('authStatus');
      const newBookInput = document.getElementById('newBookInput');
      const addBookBtn = document.getElementById('addBookBtn');
      const currentBookLabel = document.getElementById('currentBookLabel');
      const booksList = document.getElementById('booksList');
      const notesList = document.getElementById('notesList');
      const cameraVideo = document.getElementById('cameraVideo');
      const previewImage = document.getElementById('previewImage');
      const emptyPreview = document.getElementById('emptyPreview');
      const startCameraBtn = document.getElementById('startCameraBtn');
      const captureBtn = document.getElementById('captureBtn');
      const photoInput = document.getElementById('photoInput');
      const ocrBtn = document.getElementById('ocrBtn');
      const saveSelectionBtn = document.getElementById('saveSelectionBtn');
      const saveAllBtn = document.getElementById('saveAllBtn');
      const imageMeta = document.getElementById('imageMeta');
      const ocrText = document.getElementById('ocrText');
      const mainStatus = document.getElementById('mainStatus');

      let supabase;
      let session = null;
      let profile = null;
      let books = [];
      let currentBook = null;
      let cameraStream = null;
      let image = null;

      function setStatus(node, text, mode = '') {
        node.textContent = text || '';
        node.className = `status${mode ? ` ${mode}` : ''}`;
      }

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }

      function formatTs(ts) {
        const dt = new Date(Number(ts || 0));
        if (Number.isNaN(dt.getTime())) return '';
        return dt.toLocaleString('ru-RU', { timeZone: 'Europe/Moscow', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      }

      async function loadConfig() {
        const response = await fetch('/api/config');
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload?.error || 'CONFIG_LOAD_FAILED');
        supabase = createClient(payload.supabaseUrl, payload.supabaseAnonKey, {
          auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
        });
      }

      function setCurrentBookUI(book) {
        currentBook = book || null;
        currentBookLabel.textContent = currentBook?.title ? `Активная книга: ${currentBook.title}` : 'Активная книга не выбрана';
      }

      async function ensureProfile() {
        const user = session?.user;
        if (!user) return;
        const { data: existing, error: selectError } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
        if (selectError) throw selectError;
        if (!existing) {
          const { error: insertError } = await supabase.from('profiles').insert({ id: user.id });
          if (insertError) throw insertError;
          const { data: created, error: createdError } = await supabase.from('profiles').select('*').eq('id', user.id).single();
          if (createdError) throw createdError;
          profile = created;
        } else {
          profile = existing;
        }
      }

      async function fetchBooks() {
        const { data, error } = await supabase.from('books').select('*').order('title', { ascending: true });
        if (error) throw error;
        books = data || [];
        const currentBookId = profile?.current_book_id || null;
        setCurrentBookUI(books.find((b) => b.id === currentBookId) || null);
        renderBooks();
      }

      function renderBooks() {
        booksList.innerHTML = '';
        if (!books.length) {
          booksList.innerHTML = '<div class="status">Пока нет книг. Добавь первую книгу.</div>';
          return;
        }
        books.forEach((book) => {
          const item = document.createElement('div');
          item.className = `book-item${currentBook?.id === book.id ? ' active' : ''}`;
          item.innerHTML = `
            <div class="book-title">${currentBook?.id === book.id ? '✅ ' : ''}${escapeHtml(book.title)}</div>
            <div class="book-actions">
              <button data-action="select" data-id="${book.id}">Выбрать</button>
              <button data-action="notes" data-id="${book.id}">Показать заметки</button>
              <button data-action="export" data-id="${book.id}">Экспорт MD</button>
              <button data-action="delete" data-id="${book.id}" class="danger">Удалить</button>
            </div>
          `;
          booksList.appendChild(item);
        });
      }

      function renderNotes(bookTitle, notes) {
        if (!notes || !notes.length) {
          notesList.innerHTML = `<div class="status">Для книги "${escapeHtml(bookTitle || currentBook?.title || '')}" пока нет заметок.</div>`;
          return;
        }
        notesList.innerHTML = notes.map((note, idx) => `
          <div class="note-item">
            <div class="note-time">${idx + 1}. ${escapeHtml(formatTs(note.created_at))}</div>
            <div>${escapeHtml(note.text).replace(/\n/g, '<br>')}</div>
          </div>
        `).join('');
      }

      async function loadNotes(bookId = currentBook?.id) {
        if (!bookId) { renderNotes('', []); return; }
        const book = books.find((b) => b.id === bookId);
        const { data, error } = await supabase
          .from('notes')
          .select('id, text, created_at')
          .eq('book_id', bookId)
          .order('created_at', { ascending: false })
          .limit(5);
        if (error) throw error;
        renderNotes(book?.title, data || []);
      }

      async function setActiveBook(bookId) {
        const { error } = await supabase.from('profiles').update({ current_book_id: bookId }).eq('id', session.user.id);
        if (error) throw error;
        profile.current_book_id = bookId;
        setCurrentBookUI(books.find((b) => b.id === bookId) || null);
        renderBooks();
        await loadNotes(bookId);
      }

      async function createBook(title) {
        const cleanTitle = String(title || '').replace(/\s+/g, ' ').trim();
        if (!cleanTitle) return;
        const existing = books.find((b) => b.title.toLowerCase() === cleanTitle.toLowerCase());
        if (existing) {
          await setActiveBook(existing.id);
          return existing;
        }
        const { data, error } = await supabase.from('books').insert({ user_id: session.user.id, title: cleanTitle }).select('*').single();
        if (error) throw error;
        books.push(data);
        books.sort((a, b) => a.title.localeCompare(b.title, 'ru'));
        await setActiveBook(data.id);
        return data;
      }

      async function deleteBook(bookId) {
        const { error } = await supabase.from('books').delete().eq('id', bookId);
        if (error) throw error;
        books = books.filter((b) => b.id !== bookId);
        if (profile?.current_book_id === bookId) {
          profile.current_book_id = null;
          setCurrentBookUI(null);
        }
        renderBooks();
        await loadNotes();
      }

      function buildMarkdown(book, notes) {
        const now = new Date().toLocaleString('ru-RU', { timeZone: 'Europe/Moscow', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        const lines = [`# ${book.title}`, '', `Экспорт: ${now} (Europe/Moscow)`, `Количество заметок: ${notes.length}`, ''];
        notes.forEach((note, index) => {
          lines.push(`## ${index + 1} (${formatTs(note.created_at)})`);
          lines.push(note.text);
          lines.push('');
        });
        return `${lines.join('\n').trim()}\n`;
      }

      async function exportBook(bookId) {
        const book = books.find((b) => b.id === bookId);
        const { data, error } = await supabase.from('notes').select('text, created_at').eq('book_id', bookId).order('created_at', { ascending: true });
        if (error) throw error;
        if (!data?.length) throw new Error('В этой книге пока нет заметок для экспорта');
        const blob = new Blob([buildMarkdown(book, data)], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${book.title.replace(/[\\/:*?"<>|]/g, ' ').trim() || 'book'}.md`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function saveNote(text) {
        if (!currentBook?.id) throw new Error('Сначала выбери книгу');
        const cleanText = String(text || '').trim();
        if (!cleanText) throw new Error('Пустой текст нельзя сохранить');
        const { error } = await supabase.from('notes').insert({ user_id: session.user.id, book_id: currentBook.id, text: cleanText });
        if (error) throw error;
        await loadNotes(currentBook.id);
        setStatus(mainStatus, `📚 Сохранено в книгу: ${currentBook.title}`, 'ok');
      }

      async function stopCamera() {
        if (cameraStream) cameraStream.getTracks().forEach((track) => track.stop());
        cameraStream = null;
        cameraVideo.srcObject = null;
        cameraVideo.classList.add('hidden');
      }

      async function startCamera() {
        try {
          await stopCamera();
          cameraStream = await navigator.mediaDevices.getUserMedia({ audio: false, video: { facingMode: 'environment', width: { ideal: 2560 }, height: { ideal: 1440 } } });
          cameraVideo.srcObject = cameraStream;
          cameraVideo.classList.remove('hidden');
          previewImage.classList.add('hidden');
          emptyPreview.classList.add('hidden');
          setStatus(mainStatus, 'Камера включена. Можно сфотографировать страницу.');
        } catch {
          setStatus(mainStatus, 'Не удалось открыть камеру. Используй загрузку файла.', 'error');
        }
      }

      function setImageFromDataUrl(dataUrl, width, height) {
        const img = new Image();
        img.onload = () => {
          image = img;
          previewImage.src = dataUrl;
          previewImage.classList.remove('hidden');
          cameraVideo.classList.add('hidden');
          emptyPreview.classList.add('hidden');
          imageMeta.textContent = `Фото: ${width || img.width}×${height || img.height}`;
        };
        img.src = dataUrl;
      }

      function captureFrame() {
        if (!cameraStream || !cameraVideo.videoWidth || !cameraVideo.videoHeight) {
          setStatus(mainStatus, 'Камера ещё не готова.', 'error');
          return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = cameraVideo.videoWidth;
        canvas.height = cameraVideo.videoHeight;
        canvas.getContext('2d').drawImage(cameraVideo, 0, 0, canvas.width, canvas.height);
        setImageFromDataUrl(canvas.toDataURL('image/png'), canvas.width, canvas.height);
      }

      function toScanImageDataUrl() {
        const maxSide = 2200;
        const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
        const w = Math.max(1, Math.round(image.width * scale));
        const h = Math.max(1, Math.round(image.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(image, 0, 0, w, h);
        return canvas.toDataURL('image/jpeg', 0.95);
      }

      function normalizeText(text) {
        return String(text || '').replace(/\u00ad/g, '').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').replace(/[ \t]{2,}/g, ' ').trim();
      }

      function getSelectedText() {
        const start = ocrText.selectionStart;
        const end = ocrText.selectionEnd;
        return start === end ? '' : ocrText.value.slice(start, end).trim();
      }

      async function callOcr() {
        if (!image) throw new Error('Сначала загрузи или сфотографируй страницу.');
        const { data: authData } = await supabase.auth.getSession();
        const token = authData?.session?.access_token;
        if (!token) throw new Error('Сессия истекла. Войди снова.');
        const response = await fetch('/api/ocr', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ imageDataUrl: toScanImageDataUrl() })
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok || typeof payload.text !== 'string') throw new Error(payload?.error || 'OCR failed');
        return normalizeText(payload.text);
      }

      async function refreshAppData() {
        await ensureProfile();
        await fetchBooks();
        if (currentBook?.id) await loadNotes(currentBook.id);
        else renderNotes('', []);
      }

      async function applySession(nextSession) {
        session = nextSession;
        if (!session?.user) {
          appSection.classList.add('hidden');
          signOutBtn.classList.add('hidden');
          setStatus(authStatus, 'Войди по email, чтобы открыть книги и заметки.');
          return;
        }
        appSection.classList.remove('hidden');
        signOutBtn.classList.remove('hidden');
        setStatus(authStatus, `Вошёл как ${session.user.email}`, 'ok');
        await refreshAppData();
      }

      signInBtn.addEventListener('click', async () => {
        const email = String(emailInput.value || '').trim();
        if (!email) return;
        try {
          const redirectTo = window.location.origin;
          const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
          if (error) throw error;
          setStatus(authStatus, `Ссылка для входа отправлена на ${email}`, 'ok');
        } catch (error) {
          setStatus(authStatus, String(error.message || error), 'error');
        }
      });

      signOutBtn.addEventListener('click', async () => {
        await supabase.auth.signOut();
        session = null;
        profile = null;
        books = [];
        setCurrentBookUI(null);
        renderBooks();
        renderNotes('', []);
        appSection.classList.add('hidden');
        signOutBtn.classList.add('hidden');
        setStatus(authStatus, 'Ты вышел из аккаунта.');
      });

      newBookInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBookBtn.click(); });
      addBookBtn.addEventListener('click', async () => {
        try {
          const book = await createBook(newBookInput.value);
          newBookInput.value = '';
          setStatus(mainStatus, `Активная книга: ${book.title}`, 'ok');
        } catch (error) {
          setStatus(mainStatus, String(error.message || error), 'error');
        }
      });

      booksList.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const bookId = btn.dataset.id;
        const book = books.find((b) => b.id === bookId);
        if (!book) return;
        try {
          if (btn.dataset.action === 'select') {
            await setActiveBook(bookId);
            setStatus(mainStatus, `Активная книга: ${book.title}`, 'ok');
          } else if (btn.dataset.action === 'notes') {
            await loadNotes(bookId);
            setStatus(mainStatus, `Показаны заметки книги: ${book.title}`, 'ok');
          } else if (btn.dataset.action === 'export') {
            await exportBook(bookId);
            setStatus(mainStatus, `Экспорт готов: ${book.title}`, 'ok');
          } else if (btn.dataset.action === 'delete') {
            if (!confirm(`Удалить книгу "${book.title}" и все её заметки?`)) return;
            await deleteBook(bookId);
            setStatus(mainStatus, `Книга удалена: ${book.title}`, 'ok');
          }
        } catch (error) {
          setStatus(mainStatus, String(error.message || error), 'error');
        }
      });

      startCameraBtn.addEventListener('click', startCamera);
      captureBtn.addEventListener('click', captureFrame);
      photoInput.addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const bitmap = await createImageBitmap(file);
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        canvas.getContext('2d').drawImage(bitmap, 0, 0);
        setImageFromDataUrl(canvas.toDataURL('image/png'), bitmap.width, bitmap.height);
        setStatus(mainStatus, 'Фото загружено. Теперь можно распознать текст.');
      });

      ocrBtn.addEventListener('click', async () => {
        try {
          ocrBtn.disabled = true;
          setStatus(mainStatus, 'Распознаю текст...');
          ocrText.value = await callOcr();
          setStatus(mainStatus, 'Текст распознан. Его можно поправить и сохранить.', 'ok');
        } catch (error) {
          setStatus(mainStatus, String(error.message || error), 'error');
        } finally {
          ocrBtn.disabled = false;
        }
      });

      saveSelectionBtn.addEventListener('click', async () => {
        try {
          const selected = getSelectedText();
          if (!selected) throw new Error('Сначала выдели нужный фрагмент в тексте.');
          await saveNote(selected);
        } catch (error) {
          setStatus(mainStatus, String(error.message || error), 'error');
        }
      });

      saveAllBtn.addEventListener('click', async () => {
        try {
          const text = normalizeText(ocrText.value);
          if (!text) throw new Error('Текстовое поле пустое.');
          await saveNote(text);
        } catch (error) {
          setStatus(mainStatus, String(error.message || error), 'error');
        }
      });

      await loadConfig();
      const { data: { session: initialSession } } = await supabase.auth.getSession();
      await applySession(initialSession);
      supabase.auth.onAuthStateChange(async (_event, nextSession) => {
        await applySession(nextSession);
      });
    </script>
  </body>
</html>
